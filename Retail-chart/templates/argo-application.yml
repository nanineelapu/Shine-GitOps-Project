apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shine-retail-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Msocial123/Shine-GitOps-Project.git
    targetRevision: main
    path: Retail-chart
  destination:
    server: https://kubernetes.default.svc
    namespace: retail
  syncPolicy:
    automated:
      prune: true
      selfHeal: true